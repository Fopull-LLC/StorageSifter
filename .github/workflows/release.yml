name: Release

# Cut a release by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  # Let AppImages self-extract instead of needing FUSE on the runner.
  APPIMAGE_EXTRACT_AND_RUN: 1

jobs:
  build:
    # Build on an older Ubuntu so the glibc requirement stays broadly compatible.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libxkbcommon-dev libwayland-dev libxcb1-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev libasound2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release -p storagesifter

      - name: Package tarball
        id: tarball
        run: |
          set -euo pipefail
          ver="${GITHUB_REF_NAME}"
          name="storagesifter-${ver}-x86_64-linux"
          mkdir -p "dist/$name"
          cp target/release/storagesifter "dist/$name/"
          cp LICENSE README.md "dist/$name/"
          cp packaging/com.fopull.StorageSifter.desktop "dist/$name/"
          cp assets/icons/storagesifter.png "dist/$name/"
          cat > "dist/$name/INSTALL.txt" <<'TXT'
          StorageSifter — install

          Quick: copy the binary somewhere on your PATH, e.g.
            install -Dm755 storagesifter ~/.local/bin/storagesifter

          Optional desktop integration (menu entry + icon):
            install -Dm644 com.fopull.StorageSifter.desktop ~/.local/share/applications/com.fopull.StorageSifter.desktop
            install -Dm644 storagesifter.png ~/.local/share/icons/hicolor/256x256/apps/com.fopull.StorageSifter.png

          Run it:  storagesifter
          TXT
          tar -C dist -czf "dist/${name}.tar.gz" "$name"
          rm -rf "dist/$name"

      - name: Build AppImage
        run: VERSION="${GITHUB_REF_NAME}" packaging/appimage/build-appimage.sh

      - name: Checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.AppImage > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.AppImage
            dist/SHA256SUMS.txt
